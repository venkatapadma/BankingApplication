services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: banking_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"

  app:
    image: banking-application:v1
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/banking_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      - mysql